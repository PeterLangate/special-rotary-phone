<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 200" font-family="'DM Sans',sans-serif">
  <defs>
    <marker id="a5" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#746355"/></marker>
    <marker id="a5g" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#2D8653"/></marker>
    <marker id="a5o" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#C07800"/></marker>
  </defs>
  <text x="340" y="20" text-anchor="middle" fill="#4A494B" font-size="14" font-weight="700" letter-spacing="0.1em" style="text-transform:uppercase">WIZARD-UI STEGFLÖDE</text>
  <line x1="140" y1="30" x2="540" y2="30" stroke="#E5E5E5"/>

  <!-- Main flow -->
  <rect x="10" y="60" width="110" height="50" rx="6" fill="#1F1E20"/>
