  <!-- Progress bar legend -->
  <text x="40" y="172" fill="#4A494B" font-size="10" font-weight="600">Progressbar:</text>
  <rect x="120" y="162" width="30" height="10" rx="3" fill="#2D8653"/><text x="158" y="172" fill="#4A494B" font-size="9">Godkänt</text>
  <rect x="210" y="162" width="30" height="10" rx="3" fill="#B55852"/><text x="248" y="172" fill="#4A494B" font-size="9">Ej godkänt</text>
  <rect x="310" y="162" width="30" height="10" rx="3" fill="#999"/><text x="348" y="172" fill="#4A494B" font-size="9">Ej relevant</text>
  <rect x="410" y="162" width="30" height="10" rx="3" fill="#C07800"/><text x="448" y="172" fill="#4A494B" font-size="9">Skippad</text>
  <circle cx="510" cy="167" r="4" fill="#6CB4EE"/><text x="520" y="172" fill="#4A494B" font-size="9">Har kommentar/foto</text>
