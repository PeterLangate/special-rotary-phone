  <line x1="120" y1="85" x2="143" y2="85" stroke="#746355" stroke-width="1.5" marker-end="url(#a5)"/>

  <rect x="145" y="55" width="180" height="60" rx="6" fill="#1F1E20"/>
  <text x="235" y="78" text-anchor="middle" fill="white" font-size="10" font-weight="600">Kontrollpunkter 1 – N</text>
  <text x="235" y="94" text-anchor="middle" fill="#746355" font-size="9">Choice / Ja-Nej / Datum / Text</text>
  <text x="235" y="108" text-anchor="middle" fill="#2D8653" font-size="9">Auto-advance 600ms →</text>

  <line x1="325" y1="85" x2="348" y2="85" stroke="#746355" stroke-width="1.5" marker-end="url(#a5)"/>

  <rect x="350" y="60" width="100" height="50" rx="6" fill="#1F1E20"/>
  <text x="400" y="82" text-anchor="middle" fill="white" font-size="10" font-weight="600">Signatur</text>
  <text x="400" y="98" text-anchor="middle" fill="#746355" font-size="9">Canvas + Lås</text>

  <line x1="450" y1="85" x2="473" y2="85" stroke="#746355" stroke-width="1.5" marker-end="url(#a5)"/>

  <rect x="475" y="60" width="120" height="50" rx="6" fill="#2D8653"/>
  <text x="535" y="82" text-anchor="middle" fill="white" font-size="10" font-weight="600">Sammanfattning</text>
  <text x="535" y="98" text-anchor="middle" fill="#E8F5EE" font-size="9">PDF + Skicka in</text>

  <!-- Undo arrow -->
  <path d="M235,55 Q235,42 175,42 Q145,42 145,55" fill="none" stroke="#C07800" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#a5o)"/>
  <text x="190" y="38" fill="#C07800" font-size="9" font-weight="600">Ångra</text>

