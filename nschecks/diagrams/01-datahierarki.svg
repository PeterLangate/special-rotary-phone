<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 220" font-family="'DM Sans',sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#746355"/></marker>
  </defs>
  <!-- Boxes -->
  <rect x="10" y="60" width="140" height="100" rx="8" fill="#1F1E20"/>
  <rect x="185" y="60" width="140" height="100" rx="8" fill="#1F1E20"/>
  <rect x="360" y="60" width="140" height="100" rx="8" fill="#1F1E20"/>
  <rect x="535" y="60" width="140" height="100" rx="8" fill="#1F1E20"/>
  <!-- Titles -->
  <text x="80" y="92" text-anchor="middle" fill="white" font-size="13" font-weight="700">PROJEKT</text>
  <text x="255" y="92" text-anchor="middle" fill="white" font-size="13" font-weight="700">INSTALLATION</text>
  <text x="430" y="92" text-anchor="middle" fill="white" font-size="13" font-weight="700">EGENKONTROLL</text>
  <text x="605" y="92" text-anchor="middle" fill="white" font-size="13" font-weight="700">KONTROLLPUNKT</text>
  <!-- Examples -->
  <text x="80" y="114" text-anchor="middle" fill="#C8C8CA" font-size="10">Fiber Asarum Etapp 3</text>
  <text x="80" y="128" text-anchor="middle" fill="#746355" font-size="10">1 undersajt</text>
  <text x="255" y="114" text-anchor="middle" fill="#C8C8CA" font-size="10">I-11801 Hjärsåslilla</text>
  <text x="255" y="128" text-anchor="middle" fill="#746355" font-size="10">~500 per projekt</text>
  <text x="430" y="114" text-anchor="middle" fill="#C8C8CA" font-size="10">Sättning skåp</text>
  <text x="430" y="128" text-anchor="middle" fill="#746355" font-size="10">~50 mallar</text>
  <text x="605" y="114" text-anchor="middle" fill="#C8C8CA" font-size="10">Lås korrekt monterat</text>
  <text x="605" y="128" text-anchor="middle" fill="#746355" font-size="10">Ok / Ej ok / Ej rel.</text>
  <!-- Arrows -->
  <line x1="150" y1="110" x2="183" y2="110" stroke="#746355" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="325" y1="110" x2="358" y2="110" stroke="#746355" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="500" y1="110" x2="533" y2="110" stroke="#746355" stroke-width="2" marker-end="url(#arr)"/>
  <!-- Cardinality -->
  <text x="167" y="102" text-anchor="middle" fill="#746355" font-size="11" font-weight="700">1:N</text>
  <text x="342" y="102" text-anchor="middle" fill="#746355" font-size="11" font-weight="700">1:N</text>
  <text x="517" y="102" text-anchor="middle" fill="#746355" font-size="11" font-weight="700">1:N</text>
  <!-- Top label -->
  <text x="340" y="30" text-anchor="middle" fill="#4A494B" font-size="14" font-weight="700" letter-spacing="0.1em" text-transform="uppercase" style="text-transform:uppercase">DATAHIERARKI — FYRA NIVÅER</text>
  <line x1="120" y1="40" x2="560" y2="40" stroke="#E5E5E5" stroke-width="1"/>
</svg>
