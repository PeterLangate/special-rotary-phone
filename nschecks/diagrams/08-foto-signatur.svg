<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 220" font-family="'DM Sans',sans-serif">
  <defs>
    <marker id="a8" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#746355"/></marker>
  </defs>
  <text x="340" y="20" text-anchor="middle" fill="#4A494B" font-size="14" font-weight="700" letter-spacing="0.1em" style="text-transform:uppercase">FOTO- OCH SIGNATURFLÖDE</text>
  <line x1="140" y1="30" x2="540" y2="30" stroke="#E5E5E5"/>

  <!-- Photo flow -->
  <text x="20" y="55" fill="#999" font-size="10" font-weight="700" style="text-transform:uppercase">FOTOFLÖDE</text>
