  <text x="400" y="102" text-anchor="middle" fill="#746355" font-size="9">Nativ editor ✏️</text>
  <line x1="450" y1="90" x2="468" y2="90" stroke="#746355" stroke-width="1.5" marker-end="url(#a8)"/>

  <rect x="470" y="65" width="110" height="50" rx="6" fill="#2D8653"/>
