<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 520" font-family="'DM Sans',sans-serif">
  <text x="340" y="20" text-anchor="middle" fill="#4A494B" font-size="14" font-weight="700" letter-spacing="0.1em" style="text-transform:uppercase">NSChecks — KLASSDIAGRAM</text>
  <line x1="180" y1="30" x2="500" y2="30" stroke="#E5E5E5"/>

  <!-- Legend -->
  <rect x="10" y="42" width="12" height="12" rx="2" fill="#1F1E20"/>
  <text x="28" y="53" fill="#4A494B" font-size="9">Domänklass</text>
  <rect x="110" y="42" width="12" height="12" rx="2" fill="#2D8653"/>
  <text x="128" y="53" fill="#4A494B" font-size="9">Samling (kObjectArray)</text>
  <rect x="260" y="42" width="12" height="12" rx="2" fill="#746355"/>
  <text x="278" y="53" fill="#4A494B" font-size="9">Tjänst (kSPRest2)</text>
  <rect x="400" y="42" width="12" height="12" rx="2" fill="#C07800"/>
  <text x="418" y="53" fill="#4A494B" font-size="9">SPFX WebPart</text>

  <!-- DOMAIN: NSProject -->
  <rect x="10" y="70" width="155" height="90" rx="6" fill="#1F1E20"/>
  <text x="88" y="90" text-anchor="middle" fill="white" font-size="11" font-weight="700">NSProject</text>
  <line x1="20" y1="96" x2="155" y2="96" stroke="rgba(255,255,255,0.15)"/>
  <text x="20" y="110" fill="#C8C8CA" font-size="8">Title, ProjectNumber</text>
  <text x="20" y="122" fill="#C8C8CA" font-size="8">SiteUrl, Status, Manager</text>
  <text x="20" y="134" fill="#C8C8CA" font-size="8">TemplateIds[], Budget</text>
  <text x="20" y="148" fill="#746355" font-size="8">GetInstallations(), GetProgress()</text>

  <!-- DOMAIN: NSInstallation -->
  <rect x="10" y="175" width="155" height="90" rx="6" fill="#1F1E20"/>
  <text x="88" y="195" text-anchor="middle" fill="white" font-size="11" font-weight="700">NSInstallation</text>
  <line x1="20" y1="201" x2="155" y2="201" stroke="rgba(255,255,255,0.15)"/>
  <text x="20" y="215" fill="#C8C8CA" font-size="8">ObjectNumber, CustomerName</text>
  <text x="20" y="227" fill="#C8C8CA" font-size="8">Address, ObjectType, FOS</text>
  <text x="20" y="239" fill="#C8C8CA" font-size="8">Phone, Email, PostalCode</text>
  <text x="20" y="253" fill="#746355" font-size="8">GetChecklists(), GetProgress()</text>

