  <polygon points="82,173 88,180 94,173" fill="#746355"/>
  <text x="96" y="170" fill="#746355" font-size="8" font-weight="600">1:N</text>

  <line x1="88" y1="265" x2="88" y2="278" stroke="#746355" stroke-width="1.5"/>
  <polygon points="82,278 88,285 94,278" fill="#746355"/>
