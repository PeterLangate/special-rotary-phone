  <line x1="88" y1="370" x2="88" y2="383" stroke="#746355" stroke-width="1.5"/>
  <polygon points="82,383 88,390 94,383" fill="#746355"/>
  <text x="96" y="380" fill="#746355" font-size="8" font-weight="600">1:N</text>

