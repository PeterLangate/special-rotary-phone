  <rect x="10" y="280" width="155" height="90" rx="6" fill="#1F1E20"/>
  <text x="88" y="300" text-anchor="middle" fill="white" font-size="11" font-weight="700">NSChecklist</text>
  <line x1="20" y1="306" x2="155" y2="306" stroke="rgba(255,255,255,0.15)"/>
  <text x="20" y="320" fill="#C8C8CA" font-size="8">TemplateId, Status</text>
  <text x="20" y="332" fill="#C8C8CA" font-size="8">CompletedBy, GPS</text>
  <text x="20" y="344" fill="#C8C8CA" font-size="8">NotifyManager, NotifyClient</text>
  <text x="20" y="358" fill="#746355" font-size="8">GetChecks(), CanSubmit(), Submit()</text>

  <!-- DOMAIN: NSCheckItem -->
