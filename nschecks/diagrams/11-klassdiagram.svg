  <rect x="185" y="165" width="155" height="80" rx="6" fill="#1F1E20"/>
  <text x="263" y="185" text-anchor="middle" fill="white" font-size="11" font-weight="700">NSTemplateField</text>
  <line x1="195" y1="191" x2="330" y2="191" stroke="rgba(255,255,255,0.15)"/>
  <text x="195" y="205" fill="#C8C8CA" font-size="8">ControlType, IsRequired, Hint</text>
  <text x="195" y="217" fill="#C8C8CA" font-size="8">ChoiceLabels[], NumericUnit</text>
  <text x="195" y="233" fill="#C8C8CA" font-size="8">RepeaterColumns[], InfoText</text>

  <line x1="263" y1="150" x2="263" y2="163" stroke="#746355" stroke-width="1.5"/>
  <polygon points="257,163 263,170 269,163" fill="#746355"/>
  <text x="271" y="160" fill="#746355" font-size="8" font-weight="600">1:N</text>

  <!-- Arrow template → checklist -->
  <path d="M185,120 Q170,120 170,290 Q170,300 175,300" fill="none" stroke="#746355" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="172" y="210" fill="#746355" font-size="7" transform="rotate(-90 172 210)">skapar</text>

  <!-- COLLECTIONS -->
  <rect x="185" y="280" width="155" height="60" rx="6" fill="#2D8653"/>
  <text x="263" y="300" text-anchor="middle" fill="white" font-size="10" font-weight="700">NSCheckItemCollection</text>
  <text x="195" y="318" fill="#E8F5EE" font-size="8">extends kObjectArray</text>
  <text x="195" y="330" fill="#E8F5EE" font-size="8">ByType(), Answered(), Progress()</text>

  <rect x="185" y="355" width="155" height="50" rx="6" fill="#2D8653"/>
  <text x="263" y="375" text-anchor="middle" fill="white" font-size="10" font-weight="700">NSInstallationCollection</text>
  <text x="195" y="393" fill="#E8F5EE" font-size="8">Search(), SortByProgress()</text>

  <rect x="185" y="420" width="155" height="50" rx="6" fill="#2D8653"/>
  <text x="263" y="440" text-anchor="middle" fill="white" font-size="10" font-weight="700">NSChecklistCollection</text>
  <text x="195" y="458" fill="#E8F5EE" font-size="8">ByStatus(), ByTemplate()</text>

  <!-- SERVICES -->
  <rect x="365" y="70" width="155" height="50" rx="6" fill="#746355"/>
  <text x="443" y="90" text-anchor="middle" fill="white" font-size="10" font-weight="700">NSProjectService</text>
  <text x="375" y="108" fill="#F8F4EC" font-size="8">via kSPRest2 + kSPList</text>

  <rect x="365" y="135" width="155" height="50" rx="6" fill="#746355"/>
  <text x="443" y="155" text-anchor="middle" fill="white" font-size="10" font-weight="700">NSInstallationService</text>
  <text x="375" y="173" fill="#F8F4EC" font-size="8">via kSPRest2 + kSPItem</text>

  <rect x="365" y="200" width="155" height="50" rx="6" fill="#746355"/>
  <text x="443" y="220" text-anchor="middle" fill="white" font-size="10" font-weight="700">NSChecklistService</text>
  <text x="375" y="238" fill="#F8F4EC" font-size="8">via kSPRest2 + kSPItem</text>

  <rect x="365" y="265" width="155" height="50" rx="6" fill="#746355"/>
  <text x="443" y="285" text-anchor="middle" fill="white" font-size="10" font-weight="700">NSCheckItemService</text>
  <text x="375" y="303" fill="#F8F4EC" font-size="8">via kSPRest2 + kSPItem</text>

  <rect x="365" y="330" width="155" height="50" rx="6" fill="#746355"/>
  <text x="443" y="350" text-anchor="middle" fill="white" font-size="10" font-weight="700">NSDocumentService</text>
  <text x="375" y="368" fill="#F8F4EC" font-size="8">via kSPRestFiles</text>

  <rect x="365" y="395" width="155" height="50" rx="6" fill="#746355"/>
  <text x="443" y="415" text-anchor="middle" fill="white" font-size="10" font-weight="700">NSExcelImportService</text>
  <text x="375" y="433" fill="#F8F4EC" font-size="8">Azure OpenAI + kSPBatchRest</text>

  <rect x="365" y="460" width="155" height="50" rx="6" fill="#746355"/>
  <text x="443" y="480" text-anchor="middle" fill="white" font-size="10" font-weight="700">NSFortnoxService</text>
  <text x="375" y="498" fill="#F8F4EC" font-size="8">Azure Function trigger</text>

  <!-- SPFX WebParts -->
  <rect x="545" y="70" width="130" height="44" rx="6" fill="#C07800"/>
  <text x="610" y="90" text-anchor="middle" fill="white" font-size="9" font-weight="700">ProjectList</text>
  <text x="610" y="104" text-anchor="middle" fill="#FFF8E6" font-size="8">Hubb</text>

  <rect x="545" y="125" width="130" height="44" rx="6" fill="#C07800"/>
  <text x="610" y="145" text-anchor="middle" fill="white" font-size="9" font-weight="700">InstallationList</text>
  <text x="610" y="159" text-anchor="middle" fill="#FFF8E6" font-size="8">Projekt</text>

  <rect x="545" y="180" width="130" height="44" rx="6" fill="#C07800"/>
  <text x="610" y="200" text-anchor="middle" fill="white" font-size="9" font-weight="700">ChecklistView</text>
  <text x="610" y="214" text-anchor="middle" fill="#FFF8E6" font-size="8">Projekt</text>

  <rect x="545" y="235" width="130" height="44" rx="6" fill="#C07800"/>
  <text x="610" y="255" text-anchor="middle" fill="white" font-size="9" font-weight="700">ChecklistWizard</text>
  <text x="610" y="269" text-anchor="middle" fill="#FFF8E6" font-size="8">Projekt</text>

  <!-- Shared base -->
  <rect x="545" y="320" width="130" height="70" rx="6" fill="#F7F6F5" stroke="#E5E5E5"/>
  <text x="610" y="340" text-anchor="middle" fill="#999" font-size="8" font-weight="700" style="text-transform:uppercase">Delad kodbas</text>
  <text x="555" y="356" fill="#4A494B" font-size="8">kObjectArray, kObject</text>
  <text x="555" y="368" fill="#4A494B" font-size="8">kSPRest2, kSPItem, kSPList</text>
  <text x="555" y="380" fill="#4A494B" font-size="8">ks, kTime, kSPRestFiles</text>
</svg>
